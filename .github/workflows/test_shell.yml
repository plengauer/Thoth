name: 'Shell'
on:
  workflow_call:
    inputs:
      ref:
        type: string
        required: true
jobs:
  smoke:
    strategy:
      matrix:
        runner: ['ubuntu-latest', 'ubuntu-24.04-arm']
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/download-artifact@v8.0.1
        with:
          name: packages.deb.${{ inputs.ref }}
      - run: sudo apt-get -y install ./opentelemetry-shell_*_"$(arch | sed s/x86_64/amd64/g | sed s/aarch64/arm64/g | sed 's/le$/el/g')".deb apt-file
      - run: bash -c "cd tests && bash run_tests.sh bash"
      - run: sudo apt-get -y remove opentelemetry-shell
  list-released-versions:
    needs: smoke
    runs-on: ubuntu-slim
    outputs:
      versions: ${{ steps.dynamic.outputs.versions }}
    permissions:
      actions: read
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@v5.50.0
        with:
          secrets_to_redact: '["${{ github.token }}"]'
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: '${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}'
          OTEL_EXPORTER_OTLP_HEADERS: '${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}'
      - run: |
          curl --no-progress-meter --fail --header "Authorization: Bearer $GITHUB_TOKEN" --head https://api.github.com/repos/"$GITHUB_REPOSITORY"/releases?per_page=100 \
            | tr '[:upper:]' '[:lower:]' | grep '^link: ' | cut -d ' '  -f 2- | tr -d ' <>' | tr ',' '\n' | grep 'rel="last"' | cut -d ';' -f 1 | cut -d '?' -f 2- | tr '&' '\n' | grep '^page=' | cut -d = -f 2 \
            | xargs seq 1 | xargs -I '{}' curl --no-progress-meter --fail --header "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/"$GITHUB_REPOSITORY"/releases?per_page=100\&page={} | jq -r '.[].tag_name' \
            | grep -v - | grep -v '^v1.0.0$' | grep -v '^v1.1.0$' | grep -v '^v1.12.6$' \
            | head -n 256 | while read -r version; do echo \""$version"\"; done | jq -s | tr -d '\n' | tr -d ' ' | xargs -0 -I {} echo 'versions={}' >> "$GITHUB_OUTPUT"
        id: dynamic
        env:
          GITHUB_TOKEN: ${{ github.token }}
  upgrade:
    needs: [list-released-versions, smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        version: ${{ fromJSON(needs.list-released-versions.outputs.versions) }}
      fail-fast: false
    permissions:
      actions: read
    steps:
      - run: |
          curl --no-progress-meter --fail --header "Authorization: Bearer ${{ github.token }}" https://api.github.com/repos/"$GITHUB_REPOSITORY"/releases/tags/${{ matrix.version }} | jq -r '.assets | if . | any(.name | endswith("_all.deb")) then .[] | select(.name | endswith("_all.deb")) else .[] | select(.name | endswith(".deb")) end | .url' | head -n 1 | xargs wget --header "Authorization: Bearer ${{ github.token }}" --header "Accept: application/octet-stream" -O package.deb
      - run: sudo apt-get -y install ./package.deb
      - run: rm package.deb
      - uses: actions/download-artifact@v8.0.1
        with:
          name: packages.deb.${{ inputs.ref }}
      - run: sudo apt-get -y install --allow-downgrades ./opentelemetry-shell_*_all.deb
  list-images:
    needs: smoke
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.dynamic.outputs.images }}
      images_upgradeable: ${{ steps.dynamic.outputs.images_upgradeable }}
    permissions:
      actions: read
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@v5.50.0
        with:
          secrets_to_redact: '["${{ github.token }}","${{ secrets.DOCKERHUB_TOKEN }}","${{ secrets.DOCKERHUB_USERNAME }}"]'
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: '${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}'
          OTEL_EXPORTER_OTLP_HEADERS: '${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}'
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref }}
      - id: key
        run: cat .github/images.json .github/workflows/test_shell.yml meta/*/* | md5sum | cut -d ' ' -f 1 | xargs -I '{}' echo "key={}" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5.0.4
        with:
          path: images.json
          key: images ${{ steps.key.outputs.key }}
      - if: ${{ hashFiles('images.json') == '' }}
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: packages.*.${{ inputs.ref }}
          merge-multiple: true
      - run: ls
      - if: ${{ hashFiles('images.json') == '' }}
        run: |
          sudo docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' -p '${{ secrets.DOCKERHUB_TOKEN }}'
          cat .github/images.json | jq 'to_entries[] | [ .key, .value.oldest, .value.stable, .value.latest, .value.dev ] | @tsv' -r | sed 's/\t/ /g' | while read -r name oldest stable latest dev; do
            echo "$oldest" "$name" oldest
            echo "$stable" "$name" stable
            echo "$latest" "$name" latest
            echo "$dev" "$name" dev
          done | while read -r image os type; do
            image_not_found=0
            sudo docker pull "$image" >&2 || image_not_found=1 # make sure we fail on pull if image is not available
            if [ "${image_not_found:-0}" = 1 ]; then
              if [ "$type" = dev ]; then
                continue;
              else
                exit 1
              fi
            fi
            echo 'cat /etc/os-release | grep PRETTY >&2 && ((apt-get update && apt-get -y install /package.deb) || dnf -y install /package.rpm || yum -y install /package.rpm || zypper --non-interactive install --allow-unsigned-rpm /package.rpm || apk add --allow-untrusted /package.apk)' \
              | OTEL_SHELL_CONFIG_INJECT_DEEP=FALSE \sudo docker run --rm --network=host --mount type=bind,src="$(pwd)"/opentelemetry-shell_"$(cat VERSION)"_all.deb,dst=/package.deb --mount type=bind,src="$(pwd)"/opentelemetry-shell-"$(cat VERSION)"-1.noarch.rpm,dst=/package.rpm --mount type=bind,src="$(pwd)"/opentelemetry-shell-"$(cat VERSION)"-r0.apk,dst=/package.apk -i "$image" >&2 \
              && echo "{\"image\":\"$image\",\"os\":\"$os\",\"type\":\"$type\"}" || true
          done | jq -s > images.json
      - run: |
          [ "$(cat images.json | jq -r '.[].image' | wc -l)" -ge 7 ] # double check that we dont fail everywhere and then run no tests at all
          cat images.json | jq '.[] | select(.type != "dev")'                                                       | jq .image | sort -u | jq -s | tr -d '\n' | tr -d ' ' | xargs -0 -I {} echo 'images={}' >> "$GITHUB_OUTPUT"
          cat images.json | jq '.[] | select(.type != "dev") | select(.type != "latest") | select(.os == "ubuntu")' | jq .image | sort -u | jq -s | tr -d '\n' | tr -d ' ' | xargs -0 -I {} echo 'images_upgradeable={}' >> "$GITHUB_OUTPUT"
        id: dynamic
  list-shells:
    needs: smoke
    runs-on: ubuntu-slim
    outputs:
      shells: ${{ steps.dynamic.outputs.shells }}
    permissions:
      contents: read
      actions: read
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@v5.50.0
        with:
          secrets_to_redact: '["${{ github.token }}"]'
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: '${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}'
          OTEL_EXPORTER_OTLP_HEADERS: '${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}'
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref }}
      - run: |
          {
            echo sh
            cat meta/debian/control | grep '^Enhances: ' | tr ' ' '\n' | tr ',' '\n' | grep -v -F 'Enhances:' | grep -v '^$'
          } | sort -u | while read -r shell; do echo "\"$shell\""; done | jq -s | tr -d '\n' | tr -d ' ' | xargs -0 -I {} echo 'shells={}' | tee /dev/stderr >> "$GITHUB_OUTPUT"
        id: dynamic
  system-upgrade:
    needs: [list-images, smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        image: ${{ fromJSON(needs.list-images.outputs.images_upgradeable) }}
      fail-fast: false
    permissions:
      actions: read
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/download-artifact@v8.0.1
        with:
          name: packages.deb.${{ inputs.ref }}
      - run: |
          sudo docker run -v $(pwd)/opentelemetry-shell_"$(cat VERSION)"_all.deb:/root/package.deb --rm --network=host -i --entrypoint=/bin/sh ${{ matrix.image }} -e <<EOF
          apt-get update
          apt-get -y install /root/package.deb
          apt-get update && DEBIAN_FRONTEND=noninteractive apt-get -y dist-upgrade && apt-get -y autoremove && apt-get -y autoclean
          case "$(cat /etc/os-release | grep '^NAME=' | cut -d = -f 2 | tr -d \")" in
            Ubuntu)
              DEBIAN_FRONTEND=noninteractive apt-get -y install sed systemctl update-manager-core
              sed -i \"/Prompt/d\" /etc/update-manager/release-upgrades && echo "Prompt=normal" >> /etc/update-manager/release-upgrades
              do-release-upgrade -c || exit 0 && RELEASE_UPGRADER_ALLOW_THIRD_PARTY=1 do-release-upgrade -f DistUpgradeViewNonInteractive
              ;;
            Debian*)
              DEBIAN_FRONTEND=noninteractive apt-get -y install curl sed
              version_destination="$(curl -sL https://deb.debian.org/debian/dists/testing/InRelease | grep "^Codename:" | cut -d " " -f 2)"
              version_source="$(cat /etc/os-release | grep '^VERSION_CODENAME' | cut -d = -f 2)"
              sed -i "s/$version_source/$version_destination/g" /etc/apt/sources.list /etc/apt/sources.list.d/*
              sed -i "s/oldstable/testing/g" /etc/apt/sources.list /etc/apt/sources.list.d/*
              sed -i "s/stable/testing/g" /etc/apt/sources.list /etc/apt/sources.list.d/*
              ;;
            *) exit 1;;
          esac
          apt-get update && DEBIAN_FRONTEND=noninteractive apt-get -y dist-upgrade && apt-get -y autoremove && apt-get -y autoclean
          EOF
  list-dependencies:
    needs: smoke
    runs-on: ubuntu-slim
    outputs:
      dependencies: ${{ steps.dynamic.outputs.dependencies }}
    permissions:
      contents: read
      actions: read
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@v5.50.0
        with:
          secrets_to_redact: '["${{ github.token }}"]'
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: '${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}'
          OTEL_EXPORTER_OTLP_HEADERS: '${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}'
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref }}
      - run: |
          cat meta/debian/triggers | cut -sd ' ' -f 2- | rev | cut -sd / -f 1 | rev | grep -v '^$' | sed 's/node/nodejs/g' \
           | grep -vF "$(cat meta/debian/control | grep '^Pre-Depends:' | cut -d : -f 2- | tr '|' ',' | tr , '\n' | tr -d ' ' | cut -d '(' -f 1 | sed 's/python3-pip/pip3/g')" \
           | sort -u | while read -r dependency; do echo "\"$dependency\""; done | jq -s | tr -d '\n' | tr -d ' ' | xargs -0 -I {} echo 'dependencies={}' >> "$GITHUB_OUTPUT"
        id: dynamic
  dependency:
    needs: [list-dependencies, list-images, smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        image: ${{ fromJSON(needs.list-images.outputs.images) }}
        dependency: ${{ fromJSON(needs.list-dependencies.outputs.dependencies) }}
      fail-fast: false
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: packages.*.${{ inputs.ref }}
          merge-multiple: true
      - env:
          DEPENDENCY: ${{ matrix.dependency }}
        run: |
          sudo -E docker run --mount type=bind,src=$(pwd)/opentelemetry-shell_"$(cat VERSION)"_all.deb,dst=/root/package.deb --mount type=bind,src="$(pwd)"/opentelemetry-shell-"$(cat VERSION)"-1.noarch.rpm,dst=/root/package.rpm --mount type=bind,src="$(pwd)"/opentelemetry-shell-"$(cat VERSION)"-r0.apk,dst=/root/package.apk --rm --network=host -e DEPENDENCY -i --entrypoint=/bin/sh ${{ matrix.image }} -e <<EOF
          if type apt-get; then
            apt-get update
            apt-get -y remove $DEPENDENCY
            DEBIAN_FRONTEND=noninteractive apt-get -y install /root/package.deb
            DEBIAN_FRONTEND=noninteractive apt-get -y install $DEPENDENCY
            apt-get -y remove $DEPENDENCY
          elif type dnf; then
            dnf -y upgrade --refresh
            dnf -y remove $DEPENDENCY
            dnf -y install /root/package.rpm
            dnf -y install $DEPENDENCY
            dnf -y remove $DEPENDENCY || ((dnf -y remove $DEPENDENCY 2>&1 || true) | grep -F "The operation would result in removing the following protected packages")
          elif type yum; then
            yum -y update
            yum -y remove $DEPENDENCY
            yum -y install /root/package.rpm
            yum -y install $DEPENDENCY
            yum -y remove $DEPENDENCY
          elif type zypper; then
            zypper --non-interactive remove $DEPENDENCY || true
            zypper --non-interactive install --allow-unsigned-rpm /root/package.rpm
            zypper --non-interactive install $DEPENDENCY
            zypper --non-interactive remove $DEPENDENCY
          elif type apk; then
            apk del $DEPENDENCY || true
            apk add --allow-untrusted /root/package.apk
            apk add $DEPENDENCY
            apk del $DEPENDENCY
          else
            exit 1
          fi
          EOF
  install-manual-user:
    if: ${{ !github.event.repository.fork }}
    needs: [smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref }}
      - run: cat INSTALL.sh | sh -e
      - run: type otel.sh
  install-manual-os:
    needs: [list-images, smoke]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJSON(needs.list-images.outputs.images) }}
      fail-fast: false
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref }}
      - run: |
          sudo docker run --rm --network=host -i --entrypoint=/bin/sh ${{ matrix.image }} -e <<EOF
          if type apt-get; then apt-get update && DEBIAN_FRONTEND=noninteractive apt-get -y install wget curl jq gawk sudo findutils
          elif type dnf; then dnf -y install wget jq gawk sudo findutils
          elif type yum; then yum -y install wget jq gawk sudo findutils
          elif type zypper; then zypper --non-interactive install wget jq gawk sudo findutils
          elif type apk; then apk add curl wget jq gawk sudo findutils
          else exit 1
          fi
          $(cat INSTALL.sh)
          type otel.sh
          EOF
  linux-shell:
    needs: [list-images, list-shells, smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        image: ${{ fromJSON(needs.list-images.outputs.images) }}
        update: ['FALSE', 'TRUE']
        shell: ${{ fromJSON(needs.list-shells.outputs.shells) }}
      fail-fast: false
    permissions:
      contents: read
      actions: read
    steps:
      # - run: sudo docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' -p '${{ secrets.DOCKERHUB_TOKEN }}'
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: packages.*.${{ inputs.ref }}
          merge-multiple: true
      - run: mv *.deb *.rpm *.apk tests
      - run: bash -c 'cd tests && bash run_tests_containerized.sh "${{ matrix.image }}" "${{ matrix.update }}" "${{ matrix.shell }}"'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  windows-shell:
    needs: [list-shells, smoke]
    runs-on: windows-latest
    timeout-minutes: 180
    strategy:
      matrix:
        version: [1, 2]
        shell: ${{ fromJSON(needs.list-shells.outputs.shells) }}
      fail-fast: false
    permissions:
      contents: read
      actions: read
    steps:
      - uses: Vampire/setup-wsl@d1da7f2c0322a5ee4f24975344f67fc0f5baf364 # v7.0.0
        with:
          distribution: Ubuntu-24.04
          wsl-version: ${{ matrix.version }}
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/download-artifact@v8.0.1
        with:
          name: packages.deb.${{ inputs.ref }}
      - shell: wsl-bash {0}
        run: |
          sudo apt-get update
          sudo -E apt-get -y install ./opentelemetry-shell_*_"$(arch | sed s/x86_64/amd64/g | sed s/aarch64/arm64/g | sed 's/le$/el/g')".deb dos2unix jq psmisc wget curl time sudo
          for package in parallel moreutils ncat wget2 python3 python3-pip gcc docker default-jdk; do # TODO nodejs npm
            sudo -E apt-get -y install "$package" || true
          done
          [ ${{ matrix.shell }} = sh ] || sudo -E apt-get -y install ${{ matrix.shell }} || exit 0
          dos2unix tests/*.sh tests/*/*
          bash -c "cd tests && bash run_tests.sh ${{ matrix.shell }}"
          sudo apt-get -y remove opentelemetry-shell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  prepare-performance:
    needs: smoke
    runs-on: ubuntu-slim
    outputs:
      versions: ${{ steps.dynamic.outputs.versions }}
    permissions:
      contents: read
      actions: read
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@v5.50.0
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: '${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}'
          OTEL_EXPORTER_OTLP_HEADERS: '${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}'
        with:
          secrets_to_redact: '["${{ github.token }}"]'
      - run: |
          { echo '~local'; curl --no-progress-meter --fail --header "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/"$GITHUB_REPOSITORY"/releases | jq -r .[].tag_name | head --lines=10; } | while read -r version; do echo \""$version"\"; done  | jq -s | tr -d '\n' | tr -d ' ' | xargs -0 -I {} echo 'versions={}' >> "$GITHUB_OUTPUT"
        id: dynamic
        env:
          GITHUB_TOKEN: ${{ github.token }}
  performance:
    needs: [prepare-performance, smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        version: ${{ fromJSON(needs.prepare-performance.outputs.versions) }}
      fail-fast: false
    permissions:
      contents: read
      actions: read
    steps:
      - if: matrix.version == '~local'
        uses: actions/download-artifact@v8.0.1
        with:
          name: packages.deb.${{ inputs.ref }}
      - if: matrix.version != '~local'
        run: |
          url="$(curl --no-progress-meter --fail --header "Authorization: Bearer ${{ github.token }}" https://api.github.com/repos/"$GITHUB_REPOSITORY"/releases/tags/${{ matrix.version }} | jq '.assets[] | select(.name | endswith("_all.deb")) | .url' -r)"
          if [ -z "$url" ]; then url="$(curl --no-progress-meter --fail --header "Authorization: Bearer ${{ github.token }}" https://api.github.com/repos/"$GITHUB_REPOSITORY"/releases/tags/${{ matrix.version }} | jq '.assets[] | select(.name | endswith(".deb")) | .url' -r)"; fi
          wget --header "Authorization: Bearer ${{ github.token }}" --header "Accept: application/octet-stream" -O opentelemetry-shell_${{ matrix.version }}_all.deb "$url"
      - if: matrix.version == '~local'
        run: |
          mv opentelemetry-shell_*_all.deb opentelemetry-shell_${{ matrix.version }}_all.deb
      - run: sudo apt-get install -y ./opentelemetry-shell_${{ matrix.version }}_all.deb
      - run: |
          export OTEL_SHELL_SDK_OUTPUT_REDIRECT=/dev/null
          command time -f '%U' bash -c '. /usr/bin/opentelemetry_shell.sh' 2>> performance.${{ matrix.version }}.coldstart.list
          for i in $(seq 1 100); do command time -f '%U' bash -c '. /usr/bin/opentelemetry_shell.sh' 2>> performance.${{ matrix.version }}.warmstart.list; done
      - uses: actions/upload-artifact@v7.0.0
        with:
          name: performance.${{ matrix.version }}.coldstart.list
          path: performance.${{ matrix.version }}.coldstart.list
          retention-days: 1
      - uses: actions/upload-artifact@v7.0.0
        with:
          name: performance.${{ matrix.version }}.warmstart.list
          path: performance.${{ matrix.version }}.warmstart.list
          retention-days: 1
  performance-summary:
    needs: performance
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@v5.50.0
        with:
          secrets_to_redact: '["${{ github.token }}"]'
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: '${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}'
          OTEL_EXPORTER_OTLP_HEADERS: '${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}'
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: 'performance.*.list'
          merge-multiple: true
      - run: |
          for file in performance.*.list; do
            type=$(echo $file | rev | cut -d . -f 2 | rev)
            version=$(echo $file | cut -d . -f 2- | rev | cut -d . -f 3- | rev)
            cat "$file" | grep -v 'No such file or directory' | sort -n | head -n 1 | xargs echo "$version" >> "$type".list
          done
      - run: sudo apt-get update && sudo apt-get install -y gnuplot-nox
      - run: |
          echo '
            set terminal pngcairo enhanced font "Verdana,10" size 1024,1024
            set output "performance.png"
            set title "Performance Comparison"
            set xlabel "Version"
            set xtics rotate by -45
            set ylabel "Performance"
            set logscale y 10
            plot "coldstart.list" using 0:2:xticlabels(1) with linespoints title "Cold Start" lt rgb "blue", "warmstart.list" using 0:2:xticlabels(1) with linespoints title "Warm Start" lt rgb "red"
          ' > plot.gp
          gnuplot plot.gp
      - uses: actions/upload-artifact@v7.0.0
        with:
          name: performance.png
          path: performance.png
          retention-days: 90
