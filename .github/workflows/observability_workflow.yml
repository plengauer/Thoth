name: OpenTelemetry
on:
  workflow_run:
    workflows: [.github/workflows/copilot-setup-steps.yml, Analyze, Autoapprove, Autoapprove Workflow Run, Autorerun, Autofix, Autoversion Main, Autoversion Release, Backport, Build, CI, Claude, Copilot code review, Copilot coding agent, Experiment, GitHub, Greetings, Initialize Fork, OpenAI Codex, Performance GitHub Job, Publish, Recompile Agentic Workflows, Refresh Demos, Renovate, Shell, Test, Triage New Issues, Update Debian Repository, Workflow Example]
    types:
      - completed
jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/workflow@v5.47.2
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: '${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}'
          OTEL_EXPORTER_OTLP_HEADERS: '${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}'
          OTEL_SHELL_SDK_OUTPUT_REDIRECT: '/dev/stderr'
    container: ghcr.io/plengauer/opentelemetry-github-workflow-instrumentation-runner:v5.47.1
