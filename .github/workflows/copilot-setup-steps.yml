
on:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@5d8cb00c1ec6a0a9772f30e7c3045d87b9f6609e # v5.58.0
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
      - run: |
          printenv
          { find "${RUNNER_TEMP}"/*-action-* -type f -iname '*.sh' || true; find "${RUNNER_TEMP}"/*-action-* -type f -iname '*.js' || true; } | while IFS= read -r script_file; do
            echo "########## $script_file"
            cat "$script_file"
            echo "##############################"
          done
    permissions:
      actions: read
