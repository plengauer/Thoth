
on:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - run: |
          printenv
          { find "${RUNNER_TEMP}"/*-action-* -type f -iname '*.sh' || true; find "${RUNNER_TEMP}"/*-action-* -type f -iname '*.js' || true; } | while IFS= read -r script_file; do
            echo "########## $script_file"
            cat "$script_file"
            echo "##############################"
          done
    permissions:
      actions: read
