name: Report Failed Workflows

on:
  schedule:
    - cron: '0 8 * * 1'

env:
  LOOKBACK_DAYS: 7
  COPILOT_INSTRUMENTATION_ALERT_TITLE: "⚠️ Copilot Coding Agent instrumentation appears broken"

jobs:
  report:
    runs-on: ubuntu-slim
    permissions:
      actions: read
      issues: write
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@8a42906ace6a618a3b91545ef9b655b8c6d2ac23
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        with:
          secrets_to_redact: ${{ github.token }}
      - env:
          GH_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN || github.token }}
        run: |
          set -euo pipefail
          gh api "/repos/${GITHUB_REPOSITORY}/actions/runs?per_page=100" | jq -r --argjson lookback_days "$LOOKBACK_DAYS" '
            reduce (
              .workflow_runs
              | map(select(
                  .head_branch == "main"
                  and .conclusion == "failure"
                  and ((.run_started_at // .created_at | fromdateiso8601) >= (now - ($lookback_days * 86400)))
                ))[]
            ) as $run (
              [];
              if any(.[]; .name == $run.name) then
                .
              else
                . + [{name: $run.name, html_url: $run.html_url}]
              end
            )[] | [.name, .html_url] | @tsv
          ' | while IFS=$'\t' read -r workflow_name workflow_url; do
            [ -n "$workflow_name" ] || continue
            issue_title="Fix workflow ${workflow_name}"
            issue_count="$(gh issue list  --state open  --search "\"${issue_title}\" in:title"  --json title | jq --arg issue_title "$issue_title" '[.[] | select(.title == $issue_title)] | length')"
            [ "$issue_count" -gt 0 ] || gh issue create --title "$issue_title" --body "$workflow_url"
          done
  report-copilot-instrumentation:
    runs-on: ubuntu-slim
    permissions:
      actions: read
      issues: write
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/job@8a42906ace6a618a3b91545ef9b655b8c6d2ac23
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
        with:
          secrets_to_redact: ${{ github.token }}
      - env:
          GH_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN || github.token }}
        run: |
          set -euo pipefail

          run_id=""
          run_url=""
          job_id=""
          job_name=""
          job_url=""
          while IFS=$'\t' read -r candidate_run_id candidate_run_url; do
            [ -n "$candidate_run_id" ] || continue
            run_jobs="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${candidate_run_id}/jobs?per_page=100")"
            run_job="$(echo "$run_jobs" | jq -c '
              .jobs
              | map(select(
                  ((.name // "") | ascii_downcase) as $name
                  | ($name == "copilot" or $name == "claude" or $name == "codex")
                ))
              | first
            ')"
            if [ "$run_job" != "null" ]; then
              run_id="$candidate_run_id"
              run_url="$candidate_run_url"
              job_id="$(echo "$run_job" | jq -r '.id')"
              job_name="$(echo "$run_job" | jq -r '.name')"
              job_url="$(echo "$run_job" | jq -r '.html_url')"
              break
            fi
          done <<EOF
          $(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs?per_page=100" | jq -r '
            .workflow_runs[]
            | select(
                .status == "completed"
                and ((.path // "") | startswith("dynamic/"))
                and (
                  ((.actor.login // "") | ascii_downcase | contains("copilot"))
                  or ((.triggering_actor.login // "") | ascii_downcase | contains("copilot"))
                )
              )
            | [.id, .html_url]
            | @tsv
          ')
          EOF
          [ -n "$run_id" ] || { echo "No completed Copilot cloud agent run found"; exit 0; }

          step_number="$(echo "$run_job" | jq -r '
            .steps
            | map(select((.name // "") | startswith("Run ")))
            | first
            | .number // empty
          ')"
          if [ -n "$step_number" ]; then
            step_url="${job_url}#step:${step_number}:1"
          else
            step_url="$job_url"
          fi

          gh run view "$run_id" --job "$job_id" --log > /tmp/copilot-job.log
          awk '
            BEGIN {
              expected_files = 0
              current_file = ""
              lines_after_header = 0
              marker_found_for_file = 0
              missing_files = 0
            }
            function strip_prefix(line) {
              sub(/^[0-9-]+T[0-9:.]+Z[[:space:]]*/, "", line)
              return line
            }
            function finish_file() {
              if (current_file == "") return
              if (!marker_found_for_file) {
                missing_files++
                if (missing_files == 1) {
                  missing_file_list = current_file
                } else {
                  missing_file_list = missing_file_list "\\n- " current_file
                }
              }
              current_file = ""
              lines_after_header = 0
              marker_found_for_file = 0
            }
            {
              line = strip_prefix($0)
              if (line ~ /^########## .*\.sh$/) {
                finish_file()
                expected_files++
                current_file = substr(line, 12)
                gsub(/^[[:space:]]+/, "", current_file)
                marker_found_for_file = 0
                lines_after_header = 0
                next
              }
              if (current_file != "") {
                lines_after_header++
                if (line ~ /\. otel\.sh/) marker_found_for_file = 1
                if (line ~ /^##############################$/ || line ~ /^########## / || lines_after_header >= 8) {
                  finish_file()
                }
              }
            }
            END {
              finish_file()
              print "expected_files=" expected_files
              print "missing_files=" missing_files
              if (missing_files > 0) {
                print "missing_file_list=- " missing_file_list
              }
            }
          ' /tmp/copilot-job.log > /tmp/copilot-marker-check.txt

          expected_files="$(grep '^expected_files=' /tmp/copilot-marker-check.txt | cut -d= -f2)"
          missing_files="$(grep '^missing_files=' /tmp/copilot-marker-check.txt | cut -d= -f2)"
          missing_file_list="$(grep '^missing_file_list=' /tmp/copilot-marker-check.txt | cut -d= -f2- || true)"

          issue_count="$(gh issue list --state open --search "\"${COPILOT_INSTRUMENTATION_ALERT_TITLE}\" in:title" --json title | jq --arg issue_title "$COPILOT_INSTRUMENTATION_ALERT_TITLE" '[.[] | select(.title == $issue_title)] | length')"

          if [ "$expected_files" -eq 0 ] || [ "$missing_files" -gt 0 ]; then
            issue_body=$(
              cat <<EOF
          Copilot instrumentation markers were not found in the latest completed Copilot cloud agent run.

          - Run: ${run_url}
          - Job: ${job_name}
          - Job URL: ${job_url}
          - Shell print step: ${step_url}
          - Checked marker: \`. otel.sh\` within the first few lines of each printed \`.sh\` file
          - Printed \`.sh\` files found: ${expected_files}
          - Files missing marker: ${missing_files}
          EOF
            )
            if [ -n "$missing_file_list" ]; then
              issue_body="${issue_body}"$'\n'"- Missing marker in:"$'\n'"${missing_file_list}"
            fi
            issue_body="${issue_body}"$'\n\n'"Manual inspection and likely an update to Copilot detection/injection logic is needed."

            [ "$issue_count" -gt 0 ] || gh issue create --title "$COPILOT_INSTRUMENTATION_ALERT_TITLE" --body "$issue_body"
          fi
