name: Experiment
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/experiment.yml
jobs:
  env:
    strategy:
      matrix:
        runner: [ ubuntu-latest, macos-latest, windows-latest, ubuntu-slim ]
    runs-on: ${{ matrix.runner }}
    permissions:
      actions: read
    steps:
      - run: printenv
      - if: ${{ matrix.runner == 'ubuntu-slim' }}
        run: ls -la /.dockerenv || true
      - if: ${{ matrix.runner == 'ubuntu-slim' }}
        run: cat /proc/1/cgroup || true
  experiment:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./actions/instrument/job
        with:
          # secrets_to_redact: '{"foo":"*"}'        
          secrets_to_redact: '${{ toJSON(secrets) }}'
          debug: 1
        env:
          OTEL_SHELL_CONFIG_GITHUB_INJECT_ON_MAIN: 'TRUE'
          OTEL_EXPORTER_OTLP_ENDPOINT: '${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}'
          OTEL_EXPORTER_OTLP_HEADERS: '${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}'
          OTEL_SHELL_SDK_OUTPUT_REDIRECT: /dev/stderr
      - uses: renovatebot/github-action@dd5302ec17783b2fc721b19ae7209b57b1587765 # v46.1.17
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_DRY_RUN: full
        with:
          token: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
