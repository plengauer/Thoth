name: Autobackport

on:
  push:
    branches:
      - main

jobs:
  setup:
    if: ${{ !github.event.repository.fork }}
    runs-on: ubuntu-slim
    outputs:
      has_tags: ${{ steps.dynamic.outputs.has_tags }}
      refs: ${{ steps.dynamic.outputs.refs }}
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
      - id: dynamic
        run: |
          [ -z "$(git describe --tags --abbrev=0 ${{ github.sha }})" ] && echo "has_tags=true" >>  "$GITHUB_OUTPUT"
          cat '${{ github.event_path }}' | jq '.commits[].id' -r | while read -r ref; do
            if git diff-tree --root --no-commit-id --name-only -r "$ref" | grep -qE '^VERSION$' || git tag --points-at "$ref" | grep -qE '^v'; then continue; fi
            echo "$ref"
          done | while read -r ref; do echo \""$ref"\"; done | jq -s | tr -d '\n' | tr -d ' ' | xargs -0 -I {} echo 'refs={}' >> "$GITHUB_OUTPUT"
  backport:
    if: ${{ !github.event.repository.fork && needs.setup.outputs.has_tags }}
    needs: setup
    strategy:
      matrix:
        ref: ${{ fromJSON(needs.setup.outputs.refs) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      issues: read
      actions: read
    steps:
      - id: autoversion
        uses: plengauer/autoversion@c52ec7d4869f199d2b1706059fb4f9d15eb672b9 # v3.1.1
        with:
          github_token: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
          openai_token: ${{ secrets.OPENAI_TOKEN }}
          path_include: ./meta:./src:./actions:./tests:./.github
          dry_run: true
          ref: ${{ matrix.ref }}
          increments: 'patch'
          depth: 1
      - id: check_patch
        run: |
          if git diff --quiet; then echo "should_backport=true"; else echo "should_backport=false"; fi >> "$GITHUB_OUTPUT"
          git checkout .
      
      - id: prepare_branch
        if: steps.check_patch.outputs.should_backport == 'true'
        run: |
          set -e
          current_tag=$(git describe --tags --abbrev=0 ${{ matrix.ref }})
          [ -n "$current_tag" ] || exit 1
          branch_name="release/$current_tag"
          echo name="$branch_name" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --heads origin "$branch_name"; then
            git fetch origin "$branch_name"
            git checkout "$branch_name"
          else
            git checkout -b "$branch_name" "${current_tag}.0"
            git push -u origin "$branch_name"
          fi
      
      - if: steps.check_patch.outputs.should_backport == 'true'
        run: |
          set -e
          git format-patch -1 "${{ matrix.ref }}" --stdout > /tmp/commit.patch
          [ -s /tmp/commit.patch ] || exit 0
          git apply /tmp/commit.patch || git cherry-pick -n "${{ matrix.ref }}"
      
      - id: prepare_pr
        if: steps.check_patch.outputs.should_backport == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
        run: |
          set -e
          pr_number=$(gh pr list --state merged --search "${{ matrix.ref }}" --json number --jq '.[0].number' 2>/dev/null)
          echo commit_title="$(git log -1 --pretty=%s "${{ matrix.ref }}")" >> "$GITHUB_OUTPUT"
          echo author_name="$(git log -1 --pretty=%an "${{ matrix.ref }}" 2>/dev/null || echo "")" >> "$GITHUB_OUTPUT"
          echo author_email="$(git log -1 --pretty=%ae "${{ matrix.ref }}" 2>/dev/null || echo "")" >> "$GITHUB_OUTPUT"
      
      - id: open-pr
        if: steps.check_patch.outputs.should_backport == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
          commit-message: |
            ${{ steps.prepare_pr.outputs.commit_title }}
            Co-authored-by: ${{ steps.prepare_pr.outputs.author_name }} <${{ steps.prepare_pr.outputs.author_email }}>
          base: ${{ steps.prepare_branch.outputs.name }}
          branch: backport/${{ matrix.ref }}
          title: "${{ steps.prepare_pr.outputs.commit_title }}"
          body: Automated backport of commit ${{ matrix.ref }}
          delete-branch: true
      - run: sleep 60 # let API catch up
        if: steps.open-pr.outputs.pull-request-number != null
      - run: gh pr merge --squash --auto ${{ steps.open-pr.outputs.pull-request-number }}
        if: steps.open-pr.outputs.pull-request-number != null
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
